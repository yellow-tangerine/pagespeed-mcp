version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r requirements.txt
    run:
      runtime-version: 3.11
      commad: python server.py
      network:
        port: 8000
        env: PORT
      env:
        - name: PORT
          value: "8000"
      secrets: 
        - name: PAGESPEED_API_KEY
          value-from: "arn:aws:secretsmanager:eu-west-2:180796021917:secret:PAGESPEED_API_KEY-5w51dt"
