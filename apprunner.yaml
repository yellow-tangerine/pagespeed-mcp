version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r requirements.txt
    run:
      runtime-version: 3.11
      commad: python server.py
      network:
        port: 8000
        env: PORT
      env:
        - name: PORT
          value: "8000"
      secrets: 
        - name: GOOGLE_API_KEY
          value-from: "arn:aws:secretsmanager:eu-west-2:123456789012:secret:pagespeed-mcp/google-api-key-AbCdEf"
